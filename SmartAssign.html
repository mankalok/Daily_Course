<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>智策：校務排班管理 (視覺強化版)</title>
    <style>
        :root { 
            --primary: #1a73e8; --primary-dark: #1557b0;
            --danger: #d93025; --success: #188038;
            --warning: #f4b400; --highlight: #fff9c4;
            --bg: #f1f3f4; --card-bg: #ffffff;
            --text-main: #202124; --text-sub: #5f6368;
        }

        body { font-family: 'Segoe UI', 'PingFang HK', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text-main); }
        .container { max-width: 1500px; margin: auto; background: white; padding: 25px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        
        /* 標題與控制列 */
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .controls { display: flex; gap: 15px; align-items: center; background: #f8f9fa; padding: 15px; border-radius: 12px; }
        
        /* 按鈕美化 */
        .btn-group { display: flex; gap: 10px; }
        .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .btn:hover { filter: brightness(0.9); transform: translateY(-1px); }
        .btn-fill { background: var(--danger); color: white; }
        .btn-save { background: var(--primary); color: white; }
        .btn-csv { background: var(--success); color: white; }
        .btn-import { background: var(--warning); color: #333; }

        /* 時段區塊 */
        .time-block { margin-bottom: 30px; border: 1px solid #dadce0; border-radius: 12px; overflow: hidden; background: #fff; }
        .time-header { background: #e8f0fe; color: var(--primary-dark); padding: 12px 20px; font-weight: bold; font-size: 1.1em; display: flex; align-items: center; border-bottom: 1px solid #dadce0; }
        
        /* 崗位格仔 */
        .post-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; padding: 20px; }
        .post-item { 
            border: 1px solid #e0e0e0; padding: 12px; border-radius: 8px; background: #fff; 
            transition: all 0.3s; position: relative; border-top: 4px solid #ccc;
        }
        /* 當選取了人名後格仔變色 */
        .post-item.filled { border-top-color: var(--success); background: #f6ffed; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .post-name { font-weight: bold; font-size: 14px; color: #333; margin-bottom: 8px; display: block; height: 34px; line-height: 1.2; }
        .saved-info { color: #d93025; font-size: 11px; margin-bottom: 6px; background: #fff1f0; padding: 2px 5px; border-radius: 3px; display: inline-block; }
        
        select { 
            width: 100%; padding: 6px; font-size: 14px; border: 1px solid #dadce0; border-radius: 4px; 
            background: white; outline: none; cursor: pointer;
        }
        select:focus { border-color: var(--primary); }
        .highlight-me { background: var(--highlight) !important; border: 2px solid var(--warning) !important; box-shadow: 0 0 8px rgba(244,180,0,0.4); }

        /* 統計區美化 */
        .stats-area { margin-top: 40px; padding: 25px; background: #f8f9fa; border-radius: 12px; border: 1px solid #eee; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; margin-top: 15px; }
        .stat-card { 
            background: white; padding: 12px; border-radius: 8px; border: 1px solid #e0e0e0; 
            text-align: center; cursor: pointer; transition: 0.2s;
        }
        .stat-card:hover { transform: scale(1.05); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .stat-card b { font-size: 15px; color: var(--text-main); }
        .stat-card .count { font-size: 20px; font-weight: bold; color: var(--primary); display: block; margin-top: 5px; }
        .stat-active { border: 2px solid var(--warning); background: var(--highlight); }

        .loader { color: var(--primary); font-weight: bold; margin-left: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2 style="margin:0; color:var(--primary-dark);">🚀 智策校務排班管理系統</h2>
        <div class="btn-group">
            <button class="btn btn-import" onclick="document.getElementById('csvFile').click()">📥 匯入</button>
            <button class="btn btn-csv" onclick="exportCSV()">📤 匯出</button>
            <button class="btn btn-save" onclick="saveData()">💾 儲存</button>
        </div>
    </div>

    <div class="controls">
        <strong>選擇排班日期：</strong>
        <input type="date" id="targetDate" style="padding:8px; border-radius:5px; border:1px solid #ccc;" onchange="loadAllData()">
        <button class="btn btn-fill" onclick="fillAllSaved()">⚡ 一鍵填入預編名單</button>
        <span id="loadMsg" class="loader">🔄 正在處理大數據...</span>
    </div>

    <div id="scheduleArea">
        <div style="text-align:center; padding:100px; color:#999; font-size:1.2em;">請選擇日期以載入崗位數據</div>
    </div>

    <div class="stats-area">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 style="margin:0;">📊 今日工作量統計</h3>
            <div>
                <span style="font-size: 14px; color: #666;">點擊名單可全版高亮：</span>
                <select id="statTeacherSelect" style="width:180px; display:inline-block;" onchange="highlightTeacher(this.value)">
                    <option value="">-- 全員著燈 --</option>
                </select>
            </div>
        </div>
        <div id="statsGrid" class="stats-grid"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzRQ2uxw_zJ1vuCyt9BwV8pBc1fLNeFd97kRIR9G5CsCzyfRpX-v5E9KlYpngeFYMZI5Q/exec"; 
    let staffList = [];
    let rawStruct = [];
    let savedDataMap = {}; 
    let currentSchedule = {}; 

    async function loadAllData() {
        const date = document.getElementById('targetDate').value;
        if(!date) return;
        setLoading(true);
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'getAllData', date: date }) });
            const data = await res.json();
            
            staffList = data.staff;
            rawStruct = data.struct.sort((a,b) => (a.Sort || 0) - (b.Sort || 0));
            savedDataMap = {};
            currentSchedule = {};
            
            data.saved.forEach(d => {
                const key = `${d.TimeSlot.trim()}|${d.PostName.trim()}`;
                savedDataMap[key] = d.AssignedStaff.trim();
            });

            renderTeacherOptions();
            renderSchedule();
            updateStats();
        } catch (e) { alert("讀取失敗，請檢查網路連接或 GAS 部署"); }
        setLoading(false);
    }

    function renderTeacherOptions() {
        const select = document.getElementById('statTeacherSelect');
        select.innerHTML = '<option value="">-- 全員著燈 --</option>' + 
            staffList.map(n => `<option value="${n}">${n}</option>`).join('');
    }

    function renderSchedule() {
        const area = document.getElementById('scheduleArea');
        if(rawStruct.length === 0) { area.innerHTML = "今日無崗位結構數據"; return; }
        
        const times = [...new Set(rawStruct.map(d => d.TimeSlot))];
        area.innerHTML = times.map(t => {
            const posts = rawStruct.filter(d => d.TimeSlot === t);
            return `
                <div class="time-block">
                    <div class="time-header">⏰ 時段：${t}</div>
                    <div class="post-grid">
                        ${posts.map(p => {
                            const key = `${t}|${p.PostName}`;
                            const original = savedDataMap[key] || "--";
                            const current = currentSchedule[key] || "";
                            const isFilled = current !== "";
                            return `
                                <div class="post-item ${isFilled ? 'filled' : ''}" id="item_${key}">
                                    <span class="post-name">${p.PostName}</span>
                                    <div class="saved-info">原本：${original}</div>
                                    <select id="sel_${key}" onchange="updatePick('${t}','${p.PostName}',this.value)" data-time="${t}">
                                        <option value="">--</option>
                                        ${getOptionsForTime(t, current)}
                                    </select>
                                </div>`;
                        }).join('')}
                    </div>
                </div>`;
        }).join('');
    }

    // 🚀 修正後的消失邏輯
    function getOptionsForTime(time, currentVal) {
        // 找出同一時段「其他格」已經揀咗嘅人
        const pickedInTime = Object.keys(currentSchedule)
            .filter(k => k.startsWith(time + "|"))
            .map(k => currentSchedule[k])
            .filter(name => name !== "" && name !== currentVal); // 💡 重要：排除自己格仔選中的人

        return staffList.map(name => {
            // 如果「其他格」揀咗，呢一格就唔顯示（消失）
            if (pickedInTime.includes(name)) return '';
            return `<option value="${name}" ${name === currentVal ? 'selected' : ''}>${name}</option>`;
        }).join('');
    }

    function updatePick(time, post, name) {
        const key = `${time}|${post}`;
        currentSchedule[key] = name;
        
        // 更新 UI 狀態
        const item = document.getElementById(`item_${key}`);
        if(name) item.classList.add('filled'); else item.classList.remove('filled');
        
        refreshTimeSelects(time);
        updateStats();
        
        const filterName = document.getElementById('statTeacherSelect').value;
        if(filterName) highlightTeacher(filterName);
    }

    function refreshTimeSelects(time) {
        const selects = document.querySelectorAll(`select[data-time="${time}"]`);
        selects.forEach(sel => {
            const key = sel.id.replace('sel_', '');
            const current = currentSchedule[key] || "";
            sel.innerHTML = '<option value="">--</option>' + getOptionsForTime(time, current);
        });
    }

    function fillAllSaved() {
        Object.keys(savedDataMap).forEach(key => {
            currentSchedule[key] = savedDataMap[key];
        });
        renderSchedule(); 
        updateStats();
    }

    function updateStats() {
        const counts = {};
        staffList.forEach(n => counts[n] = 0);
        Object.values(currentSchedule).forEach(n => { if(n && counts.hasOwnProperty(n)) counts[n]++; });
        
        const grid = document.getElementById('statsGrid');
        grid.innerHTML = staffList.map(n => `
            <div class="stat-card" id="statCard_${n}" onclick="highlightTeacher('${n}')">
                <b>${n}</b>
                <span class="count">${counts[n]}</span>
            </div>`).join('');
    }

    function highlightTeacher(name) {
        document.getElementById('statTeacherSelect').value = name;
        document.querySelectorAll('select').forEach(s => s.classList.remove('highlight-me'));
        document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('stat-active'));
        
        if(!name) return;
        document.querySelectorAll('select').forEach(s => { if(s.value === name) s.classList.add('highlight-me'); });
        const card = document.getElementById(`statCard_${name}`);
        if(card) card.classList.add('stat-active');
    }

    function exportCSV() {
        const date = document.getElementById('targetDate').value;
        if(!date) return alert("請先選擇日期");
        let csv = "\ufeff日期,時段,崗位,老師\n";
        rawStruct.forEach(p => {
            const key = `${p.TimeSlot}|${p.PostName}`;
            const val = currentSchedule[key] || "";
            csv += `${date},${p.TimeSlot},${p.PostName},${val}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `排班表_${date}.csv`;
        a.click();
    }

    function importCSV(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const lines = e.target.result.split('\n');
            lines.slice(1).forEach(line => {
                const parts = line.split(',');
                if(parts.length >= 4) {
                    const key = `${parts[1].trim()}|${parts[2].trim()}`;
                    currentSchedule[key] = parts[3].trim();
                }
            });
            renderSchedule();
            updateStats();
        };
        reader.readAsText(input.files[0]);
    }

    async function saveData() {
        const date = document.getElementById('targetDate').value;
        if(!date) return alert("請先選擇日期");
        setLoading(true);
        const payload = Object.entries(currentSchedule).filter(e => e[1]).map(([k,v]) => {
            const [t, p] = k.split('|'); return [date, t, p, v];
        });
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateFinalSchedule', date: date, data: payload }) });
            alert(await res.text());
        } catch(e) { alert("儲存出錯"); }
        setLoading(false);
    }

    function setLoading(show) { document.getElementById('loadMsg').style.display = show ? 'inline' : 'none'; }
</script>
</body>
</html>
